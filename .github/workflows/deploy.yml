name: CI

'on':
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Frontend dependency installation currently fails in this CI environment
      # due a registry policy block on styled-jsx. Keep CI focused on backend
      # quality gates while frontend is validated by Vercel preview checks.
      - run: npm ci --workspace backend
      - run: npm run lint --workspace backend
      - run: npm test --workspace backend
      - run: npm run build --workspace backend
